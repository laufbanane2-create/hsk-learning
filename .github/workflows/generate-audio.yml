name: Generate Audio Assets

# Only run when absolutely needed:
#   - Manually via workflow_dispatch
#   - Automatically when VocabData.kt is changed (new/modified sentences)
on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - 'app/src/main/java/com/laufbanane2/hsklearning/data/VocabData.kt'

jobs:
  generate-audio:
    name: Generate ElevenLabs Audio
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install requests

      - name: Generate audio files
        env:
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
        run: python .github/scripts/generate_audio.py

      - name: Commit and push generated audio
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/src/main/res/raw/
          if git diff --cached --quiet; then
            echo "No new audio files — nothing to commit."
          else
            git commit -m "chore: generate audio assets via ElevenLabs"
            git push
          fi
