name: Build Android APK

on:
  push:
    branches: [ "**" ]

jobs:
  generate-audio:
    name: Generate ElevenLabs Audio Assets
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Need full history + write access to commit generated files back.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # generate_audio.py uses only Python stdlib — no pip install required.
      - name: Generate audio assets
        env:
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
        run: python3 scripts/generate_audio.py

      - name: Commit generated MP3s
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          raw_dir="app/src/main/res/raw"
          mp3_count=$(find "$raw_dir" -name "*.mp3" 2>/dev/null | wc -l)
          echo "Found $mp3_count MP3 file(s) in $raw_dir"
          if [ "$mp3_count" -gt 0 ]; then
            git add "$raw_dir"/*.mp3
          fi
          if git diff --cached --quiet; then
            echo "No new audio files to commit."
          else
            git commit -m "chore: update pre-generated audio assets [skip ci]"
            git push
          fi

  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    needs: generate-audio
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Pull the latest commit (which may include newly generated MP3s).
          ref: ${{ github.ref }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "${{ runner.temp }}/release.keystore"

      - name: Build release APK
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/release.keystore

          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease -PversionCode=${{ github.run_number }} --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: hsk-learning
          path: app/build/outputs/apk/release/hsk-learning.apk
          retention-days: 30

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: hsk-learning

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: v${{ github.run_number }}
          files: hsk-learning.apk
