name: HSK Scripts

on:
  push:
    branches: [ "**" ]

jobs:
  generate-audio:
    name: Generate ElevenLabs Audio Assets
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          # Need full history + write access to commit generated files back.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      # generate_audio.py uses only Python stdlib — no pip install required.
      - name: Generate audio assets
        env:
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
        run: python3 scripts/generate_audio.py

      - name: Commit generated MP3s
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          audio_dir="audio"
          mp3_count=$(find "$audio_dir" -name "*.mp3" 2>/dev/null | wc -l)
          echo "Found $mp3_count MP3 file(s) in $audio_dir"
          if [ "$mp3_count" -gt 0 ]; then
            git add "$audio_dir"/*.mp3
          fi
          if git diff --cached --quiet; then
            echo "No new audio files to commit."
          else
            git commit -m "chore: update pre-generated audio assets [skip ci]"
            git push
          fi

  build-anki-deck:
    name: Build Anki Deck (.apkg)
    runs-on: ubuntu-latest
    needs: generate-audio
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install genanki
        run: pip install genanki

      - name: Build Anki deck
        run: python3 scripts/generate_anki_deck.py --output hsk2.apkg

      - name: Upload Anki deck artifact
        uses: actions/upload-artifact@v7
        with:
          name: hsk2-anki-deck
          path: hsk2.apkg
          retention-days: 30

